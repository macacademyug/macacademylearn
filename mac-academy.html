<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mac Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0d0d0d;
    --card:     #1a1a1a;
    --card2:    #222222;
    --border:   #2a2a2a;
    --fg:       #f0f0f0;
    --muted:    #8a8a8a;
    --primary:  #FF6B1A;
    --green:    #22c55e;
    --blue:     #3B82F6;
    --gold:     #FBBF24;
    --track:    #2a2a2a;
    --radius:   14px;
    --nav-h:    72px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: 'Inter', sans-serif; overflow: hidden; }

  /* ── SCREEN SYSTEM ── */
  #app { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; overflow: hidden; }
  .screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }
  .scroll-body { flex: 1; overflow-y: auto; padding: 0 18px 24px; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* ── TOP BAR ── */
  .topbar { padding: 52px 18px 16px; }
  .topbar-row { display: flex; align-items: center; justify-content: space-between; }
  .app-name { font-size: 24px; font-weight: 700; color: var(--primary); }
  .app-sub  { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .logo-mark { width: 42px; height: 42px; background: var(--primary); border-radius: 13px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { margin-left: 2px; }

  /* ── BOTTOM NAV ── */
  .bottom-nav { height: var(--nav-h); background: #111; border-top: 1px solid var(--border); display: flex; flex-shrink: 0; }
  .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: none; background: transparent; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; padding: 8px 4px; transition: color .15s; -webkit-tap-highlight-color: transparent; }
  .nav-tab.active { color: var(--primary); }
  .nav-tab svg { transition: color .15s; }

  /* ── CARDS ── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card + .card { margin-top: 12px; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin-bottom: 14px; }
  .prog-row  { display: flex; justify-content: space-between; align-items: center; }
  .prog-title { font-size: 15px; font-weight: 700; }
  .prog-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .prog-pct   { font-size: 28px; font-weight: 700; color: var(--primary); }
  .bar-track  { height: 6px; background: var(--track); border-radius: 3px; overflow: hidden; margin-top: 10px; }
  .bar-fill   { height: 100%; background: var(--primary); border-radius: 3px; transition: width .4s ease; }

  /* ── PRO BUTTON ── */
  .pro-btn { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 16px; padding: 18px; font-size: 16px; font-weight: 700; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-bottom: 24px; box-shadow: 0 4px 18px rgba(255,107,26,.35); -webkit-tap-highlight-color: transparent; transition: opacity .15s; }
  .pro-btn:active { opacity: .85; }
  .pro-badge { background: rgba(255,255,255,.25); border-radius: 6px; padding: 2px 7px; font-size: 11px; font-weight: 700; }

  /* ── SECTION TITLE ── */
  .section-title { font-size: 19px; font-weight: 700; margin-bottom: 12px; }

  /* ── COURSE CARD ── */
  .course-card { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 14px; overflow: hidden; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity .15s; }
  .course-card:active { opacity: .82; }
  .accent-bar { width: 4px; flex-shrink: 0; }
  .course-body { flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .course-top { display: flex; align-items: center; gap: 8px; }
  .course-icon-wrap { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .level-badge { border-radius: 8px; padding: 2px 8px; font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
  .free-chip { margin-left: auto; font-size: 12px; color: var(--muted); }
  .course-title-text { font-size: 17px; font-weight: 700; }
  .course-desc { font-size: 13px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .meta-row { display: flex; align-items: center; gap: 14px; }
  .meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); }
  .chevron-right { margin-left: auto; color: var(--muted); }
  .mini-bar-track { height: 4px; background: var(--track); border-radius: 2px; overflow: hidden; margin-top: 2px; }
  .mini-bar-fill  { height: 100%; border-radius: 2px; transition: width .4s ease; }
  .mini-prog-header { display: flex; justify-content: space-between; font-size: 11px; margin-top: 4px; }

  /* ── BACK BUTTON ── */
  .back-btn { width: 42px; height: 42px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .screen-header { display: flex; align-items: center; gap: 12px; padding: 52px 18px 14px; }
  .screen-header-title { font-size: 20px; font-weight: 700; }

  /* ── COURSE DETAIL HEADER ── */
  .detail-hero { border-radius: 18px; border: 1px solid; padding: 18px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .hero-icon { width: 54px; height: 54px; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
  .hero-meta { display: flex; gap: 12px; flex-wrap: wrap; }

  /* ── LESSON ITEM ── */
  .lesson-item { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity .15s; }
  .lesson-item.locked { opacity: .5; cursor: default; }
  .lesson-item.completed { border-color: rgba(34,197,94,.4); }
  .lesson-item:not(.locked):active { opacity: .75; }
  .lesson-num { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .lesson-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .lesson-title-row { display: flex; align-items: center; gap: 8px; }
  .lesson-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .pro-tag { font-size: 9px; font-weight: 700; letter-spacing: .5px; border-radius: 5px; padding: 2px 5px; flex-shrink: 0; }
  .lesson-desc-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lesson-right { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); flex-shrink: 0; }

  /* ── LESSON PLAYER ── */
  .video-player { aspect-ratio: 16/9; background: #111; border-radius: 18px; border: 2px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-bottom: 16px; -webkit-tap-highlight-color: transparent; }
  .play-circle { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .video-hint { color: #fff; font-size: 15px; font-weight: 600; }
  .video-sub  { color: rgba(255,255,255,.45); font-size: 11px; text-align: center; padding: 0 20px; }
  .desc-card { margin-bottom: 16px; }
  .desc-label { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .desc-text  { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .complete-btn { width: 100%; border: none; border-radius: 16px; padding: 20px; font-size: 17px; font-weight: 700; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; margin-bottom: 14px; transition: opacity .15s; -webkit-tap-highlight-color: transparent; }
  .complete-btn:active { opacity: .85; }
  .completed-banner { display: flex; align-items: center; justify-content: center; gap: 12px; border-radius: 16px; border: 1px solid rgba(34,197,94,.4); background: rgba(34,197,94,.12); padding: 20px; margin-bottom: 14px; font-size: 16px; font-weight: 700; color: var(--green); }
  .next-btn { display: flex; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; gap: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .next-btn:active { opacity: .8; }
  .next-label { font-size: 11px; color: var(--muted); }
  .next-title { font-size: 15px; font-weight: 600; }
  .next-arrow { margin-left: auto; flex-shrink: 0; }
  .course-tag { display: inline-flex; align-items: center; gap: 5px; border-radius: 8px; padding: 3px 10px; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
  .lesson-title-big { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
  .lesson-meta-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
  .done-badge { display: flex; align-items: center; gap: 4px; background: rgba(34,197,94,.18); border-radius: 8px; padding: 3px 8px; font-size: 12px; font-weight: 600; color: var(--green); }

  /* ── PRO LOCK SCREEN ── */
  .pro-lock { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; gap: 16px; text-align: center; }
  .lock-icon-wrap { width: 80px; height: 80px; border-radius: 24px; background: rgba(255,107,26,.15); display: flex; align-items: center; justify-content: center; }
  .lock-title { font-size: 24px; font-weight: 700; }
  .lock-desc { font-size: 15px; color: var(--muted); line-height: 1.6; }
  .lock-btn { background: var(--primary); color: #fff; border: none; border-radius: 16px; padding: 18px 32px; font-size: 16px; font-weight: 700; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 10px; cursor: pointer; margin-top: 8px; -webkit-tap-highlight-color: transparent; }
  .back-link { font-size: 14px; color: var(--muted); cursor: pointer; margin-top: 4px; }

  /* ── PROGRESS TAB ── */
  .overall-card { border-radius: 16px; border: 1px solid rgba(255,107,26,.3); background: rgba(255,107,26,.1); padding: 18px; margin-bottom: 18px; display: flex; flex-direction: column; gap: 10px; }
  .overall-row { display: flex; justify-content: space-between; align-items: center; }
  .overall-label { font-size: 15px; font-weight: 600; }
  .overall-pct { font-size: 30px; font-weight: 700; color: var(--primary); }
  .big-track { height: 8px; background: var(--track); border-radius: 4px; overflow: hidden; }
  .big-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .4s ease; }
  .overall-sub { font-size: 12px; color: var(--muted); }
  .stats-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .stat-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .stat-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--muted); text-align: center; }
  .course-prog-row { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
  .course-prog-accent { width: 4px; flex-shrink: 0; }
  .course-prog-body { flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .course-prog-top { display: flex; align-items: center; gap: 10px; }
  .course-prog-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .course-prog-name { font-size: 14px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .course-prog-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .course-prog-pct { font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .empty-state { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; margin-top: 8px; }
  .empty-title { font-size: 16px; font-weight: 600; }
  .empty-desc  { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* ── SUPPORT TAB ── */
  .hero-banner { border-radius: 16px; border: 1px solid rgba(255,107,26,.3); background: rgba(255,107,26,.1); padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; margin-bottom: 24px; }
  .hero-icon-big { width: 56px; height: 56px; border-radius: 18px; background: var(--primary); display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
  .hero-title { font-size: 18px; font-weight: 700; }
  .hero-desc  { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .contact-card { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity .15s; }
  .contact-card:active { opacity: .8; }
  .contact-icon { width: 44px; height: 44px; border-radius: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .contact-label { font-size: 14px; font-weight: 600; }
  .contact-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .faq-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .faq-row { display: flex; align-items: flex-start; gap: 10px; }
  .faq-q { flex: 1; font-size: 14px; font-weight: 600; line-height: 1.5; }
  .faq-a { font-size: 13px; color: var(--muted); line-height: 1.6; margin-top: 10px; display: none; }
  .faq-item.open .faq-a { display: block; }
  .version-card { border-radius: 12px; border: 1px solid var(--border); background: var(--card); padding: 14px; text-align: center; font-size: 12px; color: var(--muted); margin-top: 8px; }

  /* ── SVG ICONS ── */
  svg { display: block; }
  .icon { display: inline-block; }

  /* ── UTILITIES ── */
  .flex { display: flex; } .items-center { align-items: center; } .gap-4 { gap: 4px; }
  .mt-4 { margin-top: 4px; }
</style>
</head>
<body>
<div id="app">

  <!-- ═══ COURSES TAB ═══ -->
  <div class="screen active" id="screen-courses">
    <div class="topbar">
      <div class="topbar-row">
        <div>
          <div class="app-name">Mac Academy</div>
          <div class="app-sub">FlipaClip Animation Courses</div>
        </div>
        <div class="logo-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
    </div>
    <div class="scroll-body">
      <!-- Overall progress -->
      <div class="card progress-wrap">
        <div class="prog-row">
          <div>
            <div class="prog-title">Your Progress</div>
            <div class="prog-sub" id="home-prog-sub">0 of 9 lessons completed</div>
          </div>
          <div class="prog-pct" id="home-prog-pct">0%</div>
        </div>
        <div class="bar-track"><div class="bar-fill" id="home-bar-fill" style="width:0%"></div></div>
      </div>

      <!-- Unlock Pro -->
      <button class="pro-btn" onclick="openFlutterwave()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
        Unlock Pro Lessons
        <span class="pro-badge">PRO</span>
      </button>

      <div class="section-title">All Courses</div>
      <div id="courses-list"></div>
    </div>
  </div>

  <!-- ═══ COURSE DETAIL ═══ -->
  <div class="screen" id="screen-detail">
    <div class="screen-header">
      <button class="back-btn" onclick="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="screen-header-title" id="detail-screen-title"></span>
    </div>
    <div class="scroll-body" id="detail-body"></div>
  </div>

  <!-- ═══ LESSON PLAYER ═══ -->
  <div class="screen" id="screen-lesson">
    <div id="lesson-back-header" class="screen-header">
      <button class="back-btn" onclick="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <div class="scroll-body" id="lesson-body"></div>
  </div>

  <!-- ═══ PROGRESS TAB ═══ -->
  <div class="screen" id="screen-progress">
    <div class="topbar">
      <div class="app-name" style="font-size:24px">My Progress</div>
      <div class="app-sub" style="margin-top:4px">Saved to your device</div>
    </div>
    <div class="scroll-body" id="progress-body"></div>
  </div>

  <!-- ═══ SUPPORT TAB ═══ -->
  <div class="screen" id="screen-support">
    <div class="topbar">
      <div class="app-name" style="font-size:24px">Support</div>
      <div class="app-sub" style="margin-top:4px">We're here to help</div>
    </div>
    <div class="scroll-body" id="support-body"></div>
  </div>

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-tab active" id="nav-courses" onclick="showTab('courses')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="4" height="18" rx="1"/><rect x="9" y="3" width="4" height="18" rx="1"/><rect x="16" y="3" width="6" height="18" rx="1"/></svg>
      Courses
    </button>
    <button class="nav-tab" id="nav-progress" onclick="showTab('progress')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      My Progress
    </button>
    <button class="nav-tab" id="nav-support" onclick="showTab('support')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Support
    </button>
  </nav>
</div>

<script>
// ════════════════════════════════════════
//  DATA
// ════════════════════════════════════════
const COURSES = [
  {
    id: 'basics', title: 'Basics of FlipaClip', level: 'Beginner',
    description: 'Master the essential tools and techniques to start creating your first animations in FlipaClip from scratch.',
    totalLessons: 3, estimatedHours: '30 min', color: '#22c55e',
    icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    lessons: [
      { id:'basics-1', title:'Getting Started with FlipaClip', duration:'10:00', videoUrl:'https://www.youtube.com/watch?v=PLACEHOLDER', description:"A complete walkthrough of FlipaClip's interface — brushes, the timeline, layers, and playback controls. By the end you'll know exactly where everything lives and be ready to start animating.", order:1, isPro:false },
      { id:'basics-2', title:'Drawing & Onion Skinning',       duration:'10:00', videoUrl:'https://www.youtube.com/watch?v=PLACEHOLDER', description:"Learn to draw clean frames and use onion skinning to line up your animation perfectly. You'll animate a simple bouncing ball to practice timing and spacing.", order:2, isPro:false },
      { id:'basics-3', title:'Layers, Color & Export',         duration:'10:00', videoUrl:'https://www.youtube.com/watch?v=PLACEHOLDER', description:"Use layers to separate backgrounds, characters, and effects. Add color to your animation and export a finished video ready to share on social media.", order:3, isPro:true },
    ]
  },
  {
    id: 'character', title: 'Character Animation', level: 'Intermediate',
    description: "Bring characters to life with walk cycles, run cycles, and expressive movement using FlipaClip's animation tools.",
    totalLessons: 3, estimatedHours: '30 min', color: '#3B82F6',
    icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,

const FLUTTERWAVE_LINK = 'https://flutterwave.com/pay/mac-academy-pro';
const STORAGE_KEY = 'mac_academy_progress_v3';

// ════════════════════════════════════════
//  PROGRESS STORAGE
// ════════════════════════════════════════
function getProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveProgress(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
function isComplete(lessonId) { return !!getProgress()[lessonId]; }
function markComplete(lessonId) { const p = getProgress(); p[lessonId] = true; saveProgress(p); }

function getCourseProgress(course) {
  const p = getProgress();
  const done = course.lessons.filter(l => p[l.id]).length;
  return course.totalLessons > 0 ? Math.round((done / course.totalLessons) * 100) : 0;
}
function getTotalProgress() {
  const total = COURSES.reduce((s,c) => s + c.totalLessons, 0);
  const done  = Object.values(getProgress()).filter(Boolean).length;
  return { total, done, pct: total > 0 ? Math.round((done/total)*100) : 0 };
}

// ════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════
let currentTab   = 'courses';
let screenStack  = [];   // stack of screen ids
let currentCourse = null;

function showTab(tab) {
  currentTab = tab;
  screenStack = [];
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('bottom-nav').style.display = 'flex';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'progress') renderProgress();
  if (tab === 'support')  renderSupport();
  if (tab === 'courses')  updateHomeProgress();
}

function pushScreen(screenId) {
  screenStack.push(document.querySelector('.screen.active').id);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  document.getElementById('bottom-nav').style.display = 'none';
}

function goBack() {
  if (!screenStack.length) return;
  const prev = screenStack.pop();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(prev).classList.add('active');
  if (!screenStack.length) {
    document.getElementById('bottom-nav').style.display = 'flex';
    updateHomeProgress();
    if (currentTab === 'progress') renderProgress();
  }
}

function renderLessonItem(l, c) {
  const done   = isComplete(l.id);
  const locked = l.isPro;
  let numWrap;
  if (done) {
    numWrap = `<div class="lesson-num" style="background:rgba(34,197,94,.18);color:var(--green)">${ICONS.check}</div>`;
  } else if (locked) {
    numWrap = `<div class="lesson-num" style="background:var(--card2);color:var(--muted)">${ICONS.lock}</div>`;
  } else {
    numWrap = `<div class="lesson-num" style="background:${c.color}18;color:${c.color};font-size:15px;font-weight:700">${l.order}</div>`;
  }
  const borderColor = done ? 'rgba(34,197,94,.4)' : 'var(--border)';
  const cls = locked ? 'lesson-item locked' : done ? 'lesson-item completed' : 'lesson-item';
  const onclick = locked ? '' : `onclick="openLesson('${l.id}','${c.id}')"`;
  return `
  <div class="${cls}" style="border-color:${borderColor}" ${onclick}>
    ${numWrap}
    <div class="lesson-body">
      <div class="lesson-title-row">
        <div class="lesson-name">${l.title}</div>
        ${l.isPro ? `<div class="pro-tag" style="background:${c.color}20;color:${c.color}">PRO</div>` : ''}
      </div>
      <div class="lesson-desc-preview">${l.description}</div>
    </div>
    <div class="lesson-right">
      <span>${l.duration}</span>
      ${!locked ? ICONS.chev : ''}
    </div>
  </div>`;
}

  const course = COURSES.find(c => c.id === courseId);
  const lesson = course.lessons.find(l => l.id === lessonId);
  if (lesson.isPro) { renderProLock(lesson, course); pushScreen('screen-lesson'); return; }
  renderLessonPlayer(lesson, course);
  pushScreen('screen-lesson');
}

          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${p}%;background:${c.color}"></div></div>
        </div>
      </div>`;
    }).join('')}

    ${done === 0 ? `
    <div class="empty-state">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
      <div class="empty-title">No progress yet</div>
      <div class="empty-desc">Complete your first lesson to start tracking progress here.</div>
    </div>` : ''}
  `;
}
